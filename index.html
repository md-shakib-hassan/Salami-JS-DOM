<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salami Den.</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="bg-stone-600">

    <section class="max-w-md min-h-screen mx-auto py-6 bg-gray-300 rounded-3xl">

        <header>
            <nav class="flex justify-center items-center mt-10">
                <div class=" mt-10 flex relative justify-center items-center w-9/12 mb-10">
                    <img class="w-48 absolute" src="assets/bg.png" alt="">
                    <img class="w-16" src="assets/Group.png" alt="">
                </div>
                
            </nav>

            <div class=" ">
                <h1 class="font-bold bg-gradient-to-r from-indigo-500 via-purple-500 to-blue-500 bg-clip-text text-transparent text-3xl text-center">Salami Debo Na.</h1>
                <div class="hero-content flex-col lg:flex-row-reverse">

                    <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl">
                        <div class="card-body">
                            <fieldset class="fieldset">
                                <label class="label font-bold text-xl text-black">Mobile Number</label>
                                <input type="text" id="inputNumber" class="input" placeholder="Enter your number"  required />
                                <label class="label  font-bold text-xl text-black">4 digit Pin</label>
                                <input type="password"  id="inputPin" class="input" placeholder="PIN" required />
                                <div><a class="link link-hover">Forgot password?</a></div>
                                <button class="btn btn-neutral mt-4 bg-gradient-to-r from-indigo-500 via-purple-500 to-blue-500 border-none" id="login-btn">Login</button>
                            </fieldset>
                        </div>
                    </div>
                </div>
            </div>
        </header>

    </section>


    <script src="script/Login.js"></script>
</body>

</html>
